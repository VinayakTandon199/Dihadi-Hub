<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agency Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@400;500;600;700&family=Marcellus&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; }
    :root {
      --obsidian: #0a0a0a;
      --charcoal: #141414;
      --gold: #d4af37;
      --gold-soft: rgba(212, 175, 55, 0.2);
      --cream: #f2f0e4;
    }
    body {
      margin: 0;
      font-family: "Josefin Sans", sans-serif;
      min-height: 100vh;
      background: #0a0a0a;
      color: var(--cream);
    }
    .navbar {
      height: 72px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      background: #0f0f0f;
      color: var(--cream);
      border-bottom: 2px solid #9f7e1f;
    }
    .command-title {
      margin: 0;
      font-family: "Marcellus", serif;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: var(--gold);
      font-size: 24px;
    }
    .page-layout {
      display: grid;
      grid-template-columns: 220px 1px minmax(0, 1fr);
      gap: 0;
      min-height: calc(100vh - 72px);
    }
    .sidebar {
      padding: 22px 16px;
      background: #0f0f0f;
      display: grid;
      gap: 8px;
      align-content: start;
    }
    .side-link {
      text-decoration: none;
      color: rgba(242, 240, 228, 0.8);
      text-transform: uppercase;
      letter-spacing: 0.14em;
      font-size: 12px;
      padding: 8px 2px;
      transition: color 0.2s ease;
    }
    .side-link:hover,
    .side-link.active {
      color: var(--gold);
    }
    .sidebar-divider {
      width: 1px;
      background: rgba(212, 175, 55, 0.45);
    }
    .wrap {
      max-width: 1200px;
      margin: 24px auto;
      padding: 0 16px 24px;
      display: grid;
      gap: 16px;
    }
    .card {
      background: var(--charcoal);
      border-radius: 0;
      border: 1px solid rgba(212, 175, 55, 0.2);
      padding: 20px;
    }
    .title {
      margin: 0 0 6px;
      color: var(--gold);
      font-family: "Marcellus", serif;
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }
    .sub { margin: 0 0 14px; color: rgba(242, 240, 228, 0.75); }
    .message { padding: 12px 14px; border-radius: 10px; margin-bottom: 12px; display: none; }
    .message.success { background: #dcfce7; color: #166534; }
    .message.error { background: #fee2e2; color: #991b1b; }
    .request-grid { display: grid; gap: 14px; }
    .request { border: 1px solid #e2e8f0; border-radius: 14px; padding: 16px; background: #f8fbff; }
    .req-head { display: flex; justify-content: space-between; gap: 12px; flex-wrap: wrap; align-items: center; }
    .req-name { font-weight: 800; color: #1e3a5f; }
    .badge { padding: 6px 10px; border-radius: 999px; font-size: 12px; font-weight: 700; }
    .pending { background: #dbeafe; color: #1d4ed8; }
    .accepted { background: #dcfce7; color: #166534; }
    .rejected { background: #fee2e2; color: #991b1b; }
    .meta { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; margin-top: 12px; }
    .meta div { background: #fff; border-radius: 10px; padding: 10px 12px; border: 1px solid #e2e8f0; }
    .actions { margin-top: 12px; display: flex; gap: 10px; flex-wrap: wrap; }
    .requests-table {
      width: 100%;
      border-collapse: collapse;
    }
    .requests-table th {
      text-align: left;
      color: var(--gold);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      font-weight: 600;
      padding: 12px 10px;
      border-bottom: 1px solid rgba(212, 175, 55, 0.35);
    }
    .requests-table td {
      padding: 14px 10px;
      border-bottom: 1px solid rgba(212, 175, 55, 0.18);
      color: rgba(242, 240, 228, 0.9);
      vertical-align: top;
      font-size: 14px;
    }
    .table-status {
      color: var(--gold);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-size: 12px;
      font-weight: 600;
    }
    .row-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .accept-btn {
      background: transparent;
      color: var(--gold);
      border: 1px solid rgba(212, 175, 55, 0.55);
      border-radius: 0;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      padding: 8px 10px;
    }
    .accept-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 0 16px rgba(212, 175, 55, 0.22);
    }
    .reject-btn {
      background: transparent;
      color: #d28a8a;
      border: 1px solid rgba(210, 138, 138, 0.55);
      border-radius: 0;
      transition: background-color 0.2s ease, color 0.2s ease;
      padding: 8px 10px;
    }
    .reject-btn:hover {
      background: rgba(210, 138, 138, 0.14);
      color: #ffd7d7;
    }
    button { border: none; border-radius: 0; padding: 10px 14px; font-weight: 700; cursor: pointer; }
    .accept { background: rgba(212, 175, 55, 0.18); color: var(--gold); border: 1px solid rgba(212, 175, 55, 0.45); }
    .reject { background: rgba(180, 98, 98, 0.16); color: #ffd5d5; border: 1px solid rgba(180, 98, 98, 0.45); }
    .refresh { background: transparent; color: var(--gold); border: 1px solid rgba(212, 175, 55, 0.45); }
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 1000;
      justify-content: center;
      align-items: center;
    }
    .modal.active {
      display: flex;
    }
    .modal-content {
      background: #111;
      border-radius: 0;
      border: 1px solid rgba(212, 175, 55, 0.3);
      max-width: 600px;
      width: 90%;
      max-height: 80vh;
      overflow-y: auto;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
    }
    .modal-header {
      padding: 24px;
      background: #0d0d0d;
      color: var(--cream);
      border-radius: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(212, 175, 55, 0.32);
    }
    .modal-header h2 {
      margin: 0;
      font-size: 20px;
    }
    .modal-close {
      background: none;
      border: none;
      color: #fff;
      font-size: 24px;
      cursor: pointer;
      padding: 0;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
    }
    .modal-close:hover {
      transform: rotate(90deg);
      opacity: 0.8;
    }
    .modal-body {
      padding: 24px;
    }
    .requested-count {
      background: #141414;
      padding: 16px;
      border-radius: 0;
      margin-bottom: 20px;
      border-left: 2px solid rgba(212, 175, 55, 0.6);
    }
    .requested-count strong {
      color: var(--gold);
    }
    .staff-list {
      display: grid;
      gap: 12px;
    }
    .staff-head {
      display: grid;
      grid-template-columns: 28px 1fr;
      gap: 10px;
      color: var(--gold);
      text-transform: uppercase;
      letter-spacing: 0.14em;
      font-size: 11px;
      padding: 0 6px 8px;
      border-bottom: 1px solid rgba(212, 175, 55, 0.35);
      margin-bottom: 4px;
    }
    .staff-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px;
      border: 1px solid rgba(212, 175, 55, 0.35);
      border-radius: 0;
      transition: all 0.3s ease;
      cursor: pointer;
      background: #141414;
      position: relative;
    }
    .staff-item::before,
    .staff-item::after {
      content: "";
      position: absolute;
      width: 12px;
      height: 12px;
      border-color: rgba(212, 175, 55, 0.7);
      pointer-events: none;
    }
    .staff-item::before {
      top: 4px;
      left: 4px;
      border-top: 1px solid rgba(212, 175, 55, 0.7);
      border-left: 1px solid rgba(212, 175, 55, 0.7);
    }
    .staff-item::after {
      right: 4px;
      bottom: 4px;
      border-right: 1px solid rgba(212, 175, 55, 0.7);
      border-bottom: 1px solid rgba(212, 175, 55, 0.7);
    }
    .staff-item:hover {
      border-color: rgba(212, 175, 55, 0.65);
      background: #191919;
      transform: translateY(-2px);
      box-shadow: 0 0 18px rgba(212, 175, 55, 0.16);
    }
    .staff-item.disabled {
      opacity: 0.5;
      cursor: not-allowed;
      pointer-events: none;
    }
    .staff-item.selected {
      background: #1c1a14;
      border-color: rgba(212, 175, 55, 0.8);
    }
    .staff-item input[type="checkbox"] {
      cursor: pointer;
      width: 20px;
      height: 20px;
      accent-color: #2563eb;
    }
    .staff-info {
      flex: 1;
    }
    .staff-name {
      font-weight: 700;
      color: var(--gold);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .staff-details {
      font-size: 13px;
      color: rgba(242, 240, 228, 0.72);
      margin-top: 4px;
    }
    .modal-footer {
      padding: 20px 24px;
      border-top: 1px solid rgba(212, 175, 55, 0.2);
      display: flex;
      gap: 12px;
      justify-content: flex-end;
    }
    .btn-cancel {
      background: transparent;
      color: #f0d4d4;
      border: 1px solid rgba(180, 98, 98, 0.45);
    }
    .btn-cancel:hover {
      background: rgba(180, 98, 98, 0.16);
    }
    .btn-deploy {
      background: transparent;
      color: var(--gold);
      border: 1px solid rgba(212, 175, 55, 0.55);
      transition: all 0.3s ease;
    }
    .btn-deploy:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 16px rgba(22, 163, 74, 0.3);
    }
    .btn-deploy:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .empty-staff {
      text-align: center;
      padding: 32px 16px;
      color: rgba(242, 240, 228, 0.7);
    }
    .toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      padding: 16px 20px;
      border-radius: 12px;
      color: #fff;
      font-weight: 600;
      animation: slideIn 0.3s ease;
      z-index: 2000;
      max-width: 300px;
    }
    .toast.success {
      background: linear-gradient(135deg, #16a34a, #15803d);
    }
    .toast.error {
      background: linear-gradient(135deg, #ef4444, #b91c1c);
    }
    @keyframes slideIn {
      from {
        transform: translateX(400px);
        opacity: 0;
      }
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }
    @media (max-width: 720px) {
      .page-layout {
        grid-template-columns: 1fr;
      }
      .sidebar {
        grid-auto-flow: column;
        justify-content: center;
        border-bottom: 1px solid rgba(212, 175, 55, 0.25);
      }
      .sidebar-divider {
        display: none;
      }
      .meta { grid-template-columns: 1fr; }
      .request-card-main { grid-template-columns: 1fr; }
      .modal-content {
        width: 95%;
      }
      .requests-table {
        display: block;
        overflow-x: auto;
      }
    }
  </style>
</head>
<body>
  <header class="navbar">
    <div>
      <h1 class="command-title">COMMAND CENTER</h1>
      <div id="display-agency-name" style="margin-top:6px; font-size:13px; letter-spacing:0.1em; text-transform:uppercase; color:rgba(242,240,228,0.82);">Agency Dashboard</div>
    </div>
    <a href="/auth/logout" style="color:#f2f0e4; text-decoration:none; font-weight:700; letter-spacing:0.1em; text-transform:uppercase;">Logout</a>
  </header>

  <div class="page-layout">
    <aside class="sidebar">
      <a href="#" class="side-link active">Requests</a>
      <a href="#" class="side-link">Staff Pool</a>
      <a href="#" class="side-link">Deployments</a>
    </aside>
    <div class="sidebar-divider" aria-hidden="true"></div>

  <!-- Staff Selection Modal -->
  <div id="staffModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modalTitle">Deploy Staff</h2>
        <button type="button" class="modal-close" id="modalClose">&times;</button>
      </div>
      <div class="modal-body">
        <div class="requested-count">
          <strong>Requested Count:</strong> <span id="requestedCount">0</span> staff needed
        </div>
        <div class="staff-head"><span>Select</span><span>Staff Details</span></div>
        <div id="staffListContainer" class="staff-list"></div>
      </div>
      <div class="modal-footer">
        <button type="button" class="reject btn-cancel" id="btnCancel">Cancel</button>
        <button type="button" class="accept btn-deploy" id="btnDeploy" disabled>Confirm & Deploy</button>
      </div>
    </div>
  </div>

  <main class="wrap">
    <h1 id='agency-name-header' style='color: #d4af37; margin:0; text-transform:uppercase; letter-spacing:0.12em; font-family: Marcellus, serif;'></h1>
    <section class="card">
      <h1 class="title">Incoming Contract Requests</h1>
      <p class="sub">Review pending requests from clients and accept or reject them.</p>
      <div id="messageBox" class="message"></div>
      <button id="refreshBtn" class="refresh" type="button">Refresh Requests</button>
    </section>

    <section class="card">
      <table class="requests-table" aria-label="Incoming requests table">
        <thead>
          <tr>
            <th>Client</th>
            <th>Staff Type</th>
            <th>Shift</th>
            <th>Needed</th>
            <th>Dates</th>
            <th>Address</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="requestsContainer"></tbody>
      </table>
    </section>
  </main>
  </div>

  <script>
    const requestsContainer = document.getElementById('requestsContainer');
    const messageBox = document.getElementById('messageBox');
    const refreshBtn = document.getElementById('refreshBtn');
    const agencyNameHeader = document.getElementById('agency-name-header');
    const displayAgencyName = document.getElementById('display-agency-name');
    
    // Modal elements
    const staffModal = document.getElementById('staffModal');
    const modalClose = document.getElementById('modalClose');
    const btnCancel = document.getElementById('btnCancel');
    const btnDeploy = document.getElementById('btnDeploy');
    const modalTitle = document.getElementById('modalTitle');
    const staffListContainer = document.getElementById('staffListContainer');
    const requestedCountSpan = document.getElementById('requestedCount');
    
    // Modal state
    let currentRequestId = null;
    let currentRequestInfo = null;
    let selectedStaffIds = [];
    let requiredCount = 0;

    function showMessage(type, text) {
      messageBox.className = 'message ' + type;
      messageBox.textContent = text;
      messageBox.style.display = 'block';
    }

    function hideMessage() {
      messageBox.style.display = 'none';
    }

    function showToast(type, text) {
      const toast = document.createElement('div');
      toast.className = 'toast ' + type;
      toast.textContent = text;
      document.body.appendChild(toast);
      
      setTimeout(() => {
        toast.remove();
      }, 3000);
    }

    function openModal() {
      staffModal.classList.add('active');
    }

    function closeModal() {
      staffModal.classList.remove('active');
      modalTitle.textContent = 'Deploy Staff';
      currentRequestId = null;
      currentRequestInfo = null;
      selectedStaffIds = [];
      requiredCount = 0;
    }

    async function fetchAvailableStaff(type) {
      try {
        const response = await fetch(`/agency/available-staff?type=${encodeURIComponent(type)}&agency_id=10`, {
          headers: { Accept: 'application/json' }
        });
        const data = await response.json();
        
        if (!response.ok) {
          throw new Error(data.message || 'Failed to load staff');
        }

        return Array.isArray(data) ? data : [];
      } catch (error) {
        showToast('error', error.message || 'Failed to load staff');
        return [];
      }
    }

    function displayStaffList(staffList) {
      staffListContainer.innerHTML = '';

      if (staffList.length === 0) {
        staffListContainer.innerHTML = '<div class="empty-staff">No available staff found for this type.</div>';
        btnDeploy.disabled = true;
        return;
      }

      staffList.forEach((staff, index) => {
        const staffItem = document.createElement('div');
        staffItem.className = 'staff-item';
        staffItem.innerHTML = `
          <input type="checkbox" value="${staff.id}" data-index="${index}">
          <div class="staff-info">
            <div class="staff-name">${staff.name || 'N/A'}</div>
            <div class="staff-details">Age: ${staff.age ?? 'N/A'} | Experience: ${staff.experience ?? 'N/A'} years</div>
          </div>
        `;

        const checkbox = staffItem.querySelector('input[type="checkbox"]');
        
        checkbox.addEventListener('change', (e) => {
          const selectedStaffId = Number(e.target.value);
          handleStaffSelection(e.target, staffItem, selectedStaffId);
        });

        staffListContainer.appendChild(staffItem);
      });

      updateCheckboxStates();
    }

    function handleStaffSelection(checkbox, staffItem, staffId) {
      if (checkbox.checked) {
        if (selectedStaffIds.length < requiredCount) {
          selectedStaffIds.push(staffId);
          staffItem.classList.add('selected');
        } else {
          checkbox.checked = false;
        }
      } else {
        selectedStaffIds = selectedStaffIds.filter(id => id !== staffId);
        staffItem.classList.remove('selected');
      }

      updateCheckboxStates();
    }

    function updateCheckboxStates() {
      const checkboxes = staffListContainer.querySelectorAll('input[type="checkbox"]');
      const canSelectMore = selectedStaffIds.length < requiredCount;

      checkboxes.forEach((checkbox) => {
        const staffItem = checkbox.closest('.staff-item');
        
        if (!checkbox.checked && !canSelectMore) {
          staffItem.classList.add('disabled');
          checkbox.disabled = true;
        } else {
          staffItem.classList.remove('disabled');
          checkbox.disabled = false;
        }
      });

      // Enable deploy button only if required count is selected
      btnDeploy.disabled = selectedStaffIds.length !== requiredCount;
    }

    async function openStaffSelectionModal(requestId, requestInfo) {
      currentRequestId = requestId;
      currentRequestInfo = requestInfo;
      requiredCount = requestInfo.staff_count || 1;
      selectedStaffIds = [];
      modalTitle.textContent = `Deploy Staff for ${requestInfo.client_name || 'Client'}`;

      requestedCountSpan.textContent = requiredCount;
      staffListContainer.innerHTML = '<div class="empty-staff">Loading staff...</div>';
      btnDeploy.disabled = true;

      openModal();

      // Fetch available staff
      const staffList = await fetchAvailableStaff(requestInfo.staff_type);
      displayStaffList(staffList);
    }

    async function deployStaff() {
      if (selectedStaffIds.length !== requiredCount) {
        showToast('error', `Please select exactly ${requiredCount} staff members`);
        return;
      }

      try {
        btnDeploy.disabled = true;
        btnDeploy.textContent = 'Deploying...';

        const response = await fetch('/agency/requests/' + encodeURIComponent(currentRequestId) + '/accept', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', Accept: 'application/json' },
          body: JSON.stringify({ selectedStaffIds: selectedStaffIds })
        });

        const data = await response.json();

        if (!response.ok || !data.success) {
          throw new Error(data.message || 'Deployment failed');
        }

        closeModal();
        showToast('success', 'Staff deployed successfully!');
        await fetchRequests();
      } catch (error) {
        showToast('error', error.message || 'Deployment failed');
        btnDeploy.disabled = false;
        btnDeploy.textContent = 'Confirm & Deploy';
      }
    }

    function badgeClass(status) {
      if (status === 'accepted') return 'badge accepted';
      if (status === 'rejected') return 'badge rejected';
      return 'badge pending';
    }

    function formatDate(value) {
      if (!value) return 'N/A';
      const date = new Date(value);
      return Number.isNaN(date.getTime()) ? 'N/A' : date.toLocaleDateString();
    }

    function renderRequests(requests) {
      requestsContainer.innerHTML = '';

      requests.forEach((req) => {
        const row = document.createElement('tr');
        row.innerHTML = `
          <td>${req.client_name || 'N/A'}</td>
          <td>${req.staff_type || 'N/A'}</td>
          <td>${req.work_shift || 'N/A'}</td>
          <td>${req.staff_count ?? 'N/A'}</td>
          <td>${formatDate(req.start_date)} to ${req.end_date ? formatDate(req.end_date) : 'N/A'}</td>
          <td>${req.address || 'N/A'}</td>
          <td><span class="table-status">Pending</span></td>
          <td>
            <div class="row-actions">
              <button type="button" class="accept-btn" data-id="${req.id}" data-type="${req.staff_type}" data-count="${req.staff_count}" data-client="${req.client_name || 'Client'}">Accept</button>
              <button type="button" class="reject-btn" data-id="${req.id}">Reject</button>
            </div>
          </td>
        `;

        requestsContainer.appendChild(row);
      });

      requestsContainer.querySelectorAll('.accept-btn').forEach((btn) => {
        btn.addEventListener('click', () => {
          const requestId = btn.dataset.id;
          const staffType = btn.dataset.type;
          const staffCount = parseInt(btn.dataset.count, 10);
          const clientName = btn.dataset.client;

          openStaffSelectionModal(requestId, { staff_type: staffType, staff_count: staffCount, client_name: clientName });
        });
      });

      requestsContainer.querySelectorAll('.reject-btn').forEach((btn) => {
        btn.addEventListener('click', async () => {
          const requestId = btn.dataset.id;

          try {
            const response = await fetch('/agency/requests/' + encodeURIComponent(requestId) + '/reject', {
              method: 'POST',
              headers: { Accept: 'application/json' }
            });

            const data = await response.json().catch(() => ({}));
            if (!response.ok || !data.success) {
              throw new Error(data.message || 'Rejection failed');
            }

            showToast('success', 'Request rejected successfully');
            await fetchRequests();
          } catch (error) {
            showToast('error', error.message || 'Rejection failed');
          }
        });
      });
    }

    async function fetchRequests() {
      hideMessage();
      requestsContainer.innerHTML = '<tr><td colspan="8">Loading requests...</td></tr>';

      try {
        const response = await fetch('/agency/requests', { headers: { Accept: 'application/json' } });
        const data = await response.json();
        const client2Requests = Array.isArray(data)
          ? data.filter((item) => Number(item.client_id) === 7 || String(item.client_name || '').toLowerCase() === 'client2')
          : [];
        const dashboardData = {
          agencyName: (Array.isArray(data) && data[0]?.agency_name) || 'Agency Dashboard',
          requests: client2Requests
        };

        document.getElementById('agency-name-header').innerText = dashboardData.agencyName;

        if (!response.ok) {
          throw new Error(data.message || 'Failed to load requests');
        }

        if (!dashboardData.requests.length) {
          displayAgencyName.textContent = 'Agency Dashboard';
          agencyNameHeader.innerText = 'Agency Dashboard';
          requestsContainer.innerHTML = '<tr><td colspan="8">No contract requests found.</td></tr>';
          return;
        }

        displayAgencyName.textContent = dashboardData.agencyName;
        renderRequests(dashboardData.requests);
      } catch (error) {
        requestsContainer.innerHTML = '<tr><td colspan="8">Unable to load requests.</td></tr>';
        showMessage('error', error.message || 'Unable to load requests');
      }
    }

    // Modal event listeners
    modalClose.addEventListener('click', closeModal);
    btnCancel.addEventListener('click', closeModal);
    btnDeploy.addEventListener('click', deployStaff);
    
    // Close modal when clicking outside
    staffModal.addEventListener('click', (e) => {
      if (e.target === staffModal) {
        closeModal();
      }
    });

    refreshBtn.addEventListener('click', fetchRequests);
    fetchRequests();
  </script>
</body>
</html>
