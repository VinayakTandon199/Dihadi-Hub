<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agency Management System - Register</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Josefin+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
        :root {
            --obsidian: #0a0a0a;
            --cream: #f2f0e4;
            --gold: #d4af37;
            --gold-soft: rgba(212, 175, 55, 0.2);
            --gold-glow: rgba(212, 175, 55, 0.32);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            min-height: 100%;
        }

        body {
            font-family: 'Josefin Sans', sans-serif;
            background:
                linear-gradient(135deg, rgba(212, 175, 55, 0.02) 0 2px, transparent 2px 16px),
                linear-gradient(45deg, rgba(212, 175, 55, 0.02) 0 2px, transparent 2px 16px),
                var(--obsidian);
            background-size: 22px 22px, 22px 22px, auto;
            color: var(--cream);
            min-height: 100vh;
            padding: 32px 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            background: radial-gradient(circle at top, rgba(212, 175, 55, 0.08), transparent 36%);
        }

        .card {
            width: 100%;
            max-width: 520px;
            position: relative;
            z-index: 1;
            border: 1px solid var(--gold-soft);
            padding: 34px 28px 30px;
            background: transparent;
        }

        .eyebrow {
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 0.35em;
            color: rgba(242, 240, 228, 0.72);
            font-size: 0.75rem;
            margin-bottom: 12px;
        }

        h1 {
            font-family: 'Marcellus', serif;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 0.22em;
            color: var(--gold);
            font-size: clamp(1.8rem, 3vw, 2.4rem);
            font-weight: 400;
            margin-bottom: 10px;
        }

        .subtitle {
            text-align: center;
            color: rgba(242, 240, 228, 0.82);
            font-size: 0.95rem;
            margin-bottom: 26px;
        }

        .message {
            display: none;
            margin-bottom: 18px;
            padding: 12px 0;
            border-bottom: 1px solid rgba(212, 175, 55, 0.3);
            color: var(--cream);
            font-size: 0.92rem;
            line-height: 1.5;
            text-align: center;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .role-specific {
            display: none;
            margin-top: 2px;
        }

        label {
            display: block;
            margin-bottom: 10px;
            color: rgba(242, 240, 228, 0.9);
            font-size: 0.9rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        input,
        select,
        textarea {
            width: 100%;
            border: none;
            border-bottom: 2px solid rgba(212, 175, 55, 0.55);
            background: transparent;
            color: var(--cream);
            padding: 12px 2px 10px;
            font-size: 0.98rem;
            outline: none;
            transition: border-color 0.25s ease, box-shadow 0.25s ease, color 0.25s ease;
            border-radius: 0;
        }

        textarea {
            resize: none;
            min-height: 96px;
        }

        input::placeholder,
        select::placeholder,
        textarea::placeholder {
            color: rgba(242, 240, 228, 0.42);
        }

        input:focus,
        select:focus,
        textarea:focus {
            border-bottom-color: var(--gold);
            box-shadow: 0 10px 18px -14px var(--gold-glow);
        }

        select {
            appearance: none;
        }

        option {
            background: #141414;
            color: var(--cream);
        }

        button {
            width: 100%;
            margin-top: 10px;
            border: 1px solid var(--gold);
            background: transparent;
            color: var(--gold);
            padding: 14px 18px;
            font-family: 'Marcellus', serif;
            font-size: 1rem;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            cursor: pointer;
            transition: transform 0.25s ease, box-shadow 0.25s ease, background 0.25s ease, color 0.25s ease;
            border-radius: 0;
        }

        button:hover {
            transform: translateY(-2px);
            background: var(--gold);
            color: var(--obsidian);
            box-shadow: 0 0 24px rgba(212, 175, 55, 0.28);
        }

        .footer-text {
            text-align: center;
            margin-top: 22px;
            color: rgba(242, 240, 228, 0.7);
            font-size: 0.92rem;
        }

        .footer-text a {
            color: var(--gold);
            text-decoration: none;
            border-bottom: 1px solid transparent;
            transition: border-color 0.2s ease, color 0.2s ease;
        }

        .footer-text a:hover {
            border-bottom-color: var(--gold);
            color: var(--cream);
        }

        @media (max-width: 600px) {
            body {
                padding: 18px 14px;
            }

            .card {
                padding: 28px 18px 22px;
            }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="eyebrow">Minimalist Art Deco</div>
        <h1>Register</h1>
        <p class="subtitle">Join the empire with a refined profile.</p>

        <div id="message" class="message"></div>

        <form id="registerForm" method="POST" action="/auth/register">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Choose a username" required />
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Choose a password" required />
            </div>

            <div class="form-group">
                <label for="confirm_password">Confirm Password</label>
                <input type="password" id="confirm_password" name="confirm_password" placeholder="Confirm your password" required />
            </div>

            <div class="form-group">
                <label for="role">Role</label>
                <select id="role" name="role" required>
                    <option value="">Select Role</option>
                    <option value="client">Client</option>
                    <option value="staff">Staff</option>
                    <option value="agency">Agency</option>
                </select>
            </div>

            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" placeholder="Enter your full name" required />
            </div>

            <div class="form-group">
                <label for="age">Age</label>
                <input type="number" id="age" name="age" placeholder="Enter your age" min="18" max="100" />
            </div>

            <div class="form-group">
                <label for="gender">Gender</label>
                <select id="gender" name="gender">
                    <option value="">Select Gender</option>
                    <option value="male">Male</option>
                    <option value="female">Female</option>
                    <option value="other">Other</option>
                </select>
            </div>

            <div class="form-group">
                <label for="contact">Contact Number</label>
                <input type="tel" id="contact" name="contact" placeholder="Enter contact number" />
            </div>

            <div class="form-group">
                <label for="address">Address</label>
                <textarea id="address" name="address" placeholder="Enter full address" rows="3"></textarea>
            </div>

            <div id="agency-fields" class="role-specific">
                <div class="form-group">
                    <label for="agency-type">Agency Type</label>
                    <input type="text" id="agency-type" name="type" placeholder="e.g. Recruitment, Marketing, IT" />
                </div>
                <div class="form-group">
                    <label for="agency-experience">Years of Experience</label>
                    <input type="text" id="agency-experience" name="experience" placeholder="e.g. 5 years" />
                </div>
                <div class="form-group">
                    <label for="agency-work-shift">Work Shift</label>
                    <select id="agency-work-shift" name="work_shift">
                        <option value="">Select Work Shift</option>
                        <option value="morning">morning</option>
                        <option value="evening">Evening</option>
                        <option value="night">Night</option>
                        <option value="flexible">Flexible</option>
                    </select>
                </div>
            </div>

            <div id="staff-fields" class="role-specific">
                <div class="form-group">
                    <label for="staff-type">Staff Type</label>
                    <input type="text" id="staff-type" name="type" placeholder="e.g. Security, Cleaner, Driver" />
                </div>
                <div class="form-group">
                    <label for="staff-experience">Years of Experience</label>
                    <input type="text" id="staff-experience" name="experience" placeholder="e.g. 2 years" />
                </div>
                <div class="form-group">
                    <label for="expected_salary">Expected Salary (per month)</label>
                    <input type="number" id="expected_salary" name="expected_salary" placeholder="e.g. 25000" min="0" step="0.01" />
                </div>
                <div class="form-group">
                    <label for="staff-work-shift">Work Shift</label>
                    <select id="staff-work-shift" name="work_shift">
                        <option value="">Select Work Shift</option>
                        <option value="morning">morning</option>
                        <option value="evening">Evening</option>
                        <option value="night">Night</option>
                        <option value="flexible">Flexible</option>
                    </select>
                </div>
            </div>

            <div id="client-fields" class="role-specific">
                <div class="form-group">
                    <label for="client-type">Client Type</label>
                    <input type="text" id="client-type" name="type" placeholder="e.g. Individual, Corporate, NGO" />
                </div>
                <div class="form-group">
                    <label for="client-work-shift">Work Shift</label>
                    <select id="client-work-shift" name="work_shift">
                        <option value="">Select Work Shift</option>
                        <option value="morning">morning</option>
                        <option value="evening">Evening</option>
                        <option value="night">Night</option>
                        <option value="flexible">Flexible</option>
                    </select>
                </div>
            </div>

            <button type="submit">Join the Empire</button>
        </form>

        <p class="footer-text">
            Already have an account? <a href="/login">Login here</a>
        </p>
    </div>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            const error = params.get('error');
            const success = params.get('success');
            const msgDiv = document.getElementById('message');

            if (msgDiv) {
                if (error) {
                    msgDiv.style.display = 'block';
                    msgDiv.textContent = error;
                }
                if (success) {
                    msgDiv.style.display = 'block';
                    msgDiv.textContent = success;
                }
            }
        });

        const roleSelect = document.getElementById('role');
        const agencyFields = document.getElementById('agency-fields');
        const staffFields = document.getElementById('staff-fields');
        const clientFields = document.getElementById('client-fields');

        function hideAllRoleFields() {
            if (agencyFields) agencyFields.style.display = 'none';
            if (staffFields) staffFields.style.display = 'none';
            if (clientFields) clientFields.style.display = 'none';
        }

        hideAllRoleFields();

        if (roleSelect) {
            roleSelect.addEventListener('change', function () {
                hideAllRoleFields();
                const selected = this.value;
                if (selected === 'agency' && agencyFields) {
                    agencyFields.style.display = 'block';
                } else if (selected === 'staff' && staffFields) {
                    staffFields.style.display = 'block';
                } else if (selected === 'client' && clientFields) {
                    clientFields.style.display = 'block';
                }
            });
        }

        const registerForm = document.getElementById('registerForm');
        if (registerForm) {
            registerForm.addEventListener('submit', function (e) {
                const password = document.getElementById('password');
                const confirmPassword = document.getElementById('confirm_password');
                const contact = document.getElementById('contact');
                const msgDiv = document.getElementById('message');

                if (password && confirmPassword && password.value !== confirmPassword.value) {
                    e.preventDefault();
                    if (msgDiv) {
                        msgDiv.style.display = 'block';
                        msgDiv.textContent = 'Passwords do not match';
                    }
                    return;
                }

                if (contact && contact.value) {
                    const contactVal = contact.value.trim();
                    if (contactVal.length !== 10 || isNaN(contactVal)) {
                        e.preventDefault();
                        if (msgDiv) {
                            msgDiv.style.display = 'block';
                            msgDiv.textContent = 'Contact number must be exactly 10 digits';
                        }
                        return;
                    }
                }
            });
        }
    </script>
</body>
</html>
